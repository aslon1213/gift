      tags:
      - alerts
  /api/v1/auth/me:
    get:
      consumes:
      - application/json
      description: Retrieves the authenticated user's information along with a credit
        summary.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/aslon1213_gift_pkg_repository.Response-pkg_handlers_UserInfoResponse'
        "401":
          description: Unauthorized
          schema:
