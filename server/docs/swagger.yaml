        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/aslon1213_gift_pkg_repository.Response-aslon1213_gift_pkg_repository_Empty'
      security:
      - ApiKeyAuth: []
      summary: Create borrowing
      tags:
      - borrowings
  /api/v1/borrowings/{id}:
    delete:
      description: |-
        Deletes a one-OID borrowing, or a two-OID borrowing once it is
        fully resolved.
      parameters:
      - description: Borrowing ID (hex)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
